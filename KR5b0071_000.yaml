body:
  text: 晨昏運度耀明古今萬類受禀給化成形𡨚業誤染三世相侵正一之氣解免𡨚魂聞之即散聽之離分天丁甲卒扶護無傾速生速免各得安寧元皇符命時刻不停急急如律令是時念經七遍夜叉座前拜謝天尊我今承斯功德徑往中土託生冨貴之家拜謝而去衆人聞之皆大歡喜天尊曰此經非獨解一人之𡨚給汝等各發誠心誦經百遍一國之人應有冤結悉皆解脫于㑹下言同聲誦之至於百遍驀見隂雲四布黑霧之中瑞氣垂空諸多類拜而言我等特蒙天慈降賜經法一國𡨚結已生未生罪無輕重咸皆解脫倐忽之間雲收霧斂天氣朗清人民歡慶讃謝天恩衆等告曰然賴道力普得濟度雖無即目之𡨚慮有他時所犯作何預修功德永離此苦天尊曰吾今說此三生解𡨚妙經若有善男子善女人每日燒香誦經三遍己身𡨚結盡皆消滅如精心抄一本與人合家眷屬同霑福惠若復有人胎氣怯弱或數落不安轉禮此經即得安穩必得智慧男女如睡夢中間常見亡過兒女此是𡨚業又待重來精心每日旦暮燒香拜禮此經冤魂自退普無驚怖若復有人臨産多難即於難月之前請正一道士法師對三清聖像焚香誦經遂感善神護佑誕育順理則無冤橫之灾子母全安各保天年之壽如行住坐卧精誠持念後世為人冨貴聰明形容端正子孫榮旺獲福無量歎斯因緣而作偈曰衆生多結𡨚𡨚深難解給一日結成𡨚三世報不歇我今傳妙經解除諸𡨚業聞誦志心聽𡨚家自消滅是時天尊說經既畢諸仙大聖來迎天尊巡遊他方濟拔羣品再為國王后妃曰自後依奉正道即生孝慧之男吾今付汝靈符三道朱書吞之一符保身一符辟𡨚魂一符催速生汝等可以教世人遵敬奉行保身符辟寃符催産符太上三生解𡨚妙經
