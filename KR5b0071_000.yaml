front:
  text: 太上三生解寃妙經服九爾時尋聲救苦天尊與諸侍從巡遊十方世界化度衆生出離苦海令歸正道不入邪宗觀見西方於內一國王號淨梵此國人民多生淫殺不造善功多沈地獄多失人身念彼衆生遂即化身下降其國王夜夢神報來日天真自東而至何不迎之王心不寐坐而待旦詔衆大臣后妃天親及諸市民逺離本所迎接天尊至於城西有一大園樓閣嚴整花太繁盛是時天尊在七寶殿內金龍座上天童侍衛國王大臣后妃天親及諸市民座下圍繞觀聽演說正一妙法俄然瑞氣盈圍天花交散大衆驚異喜恱難言時有皇后及諸貴妃燒香拜禮跪而告曰弊居小國愚魯之邦未嘗得聞如斯髙玄妙道今日過值深為幸矣有少短意欲訴道前伏願洪慈特賜允許天尊曰汝有何言盡心而說皇后告曰今王年老子嗣未立先有所懷數月之中遂致損落其或月滿所得男女或一歲二嵗或三嵗或五嵗之間即便死亡未知前生今世何罪致得如是若蒙哀愍則仰受訣言天尊曰是汝前生之中懷孕不愼殺落其胎兒女心內憎嫌故得今身如此之報恐汝不信吾今攝此𡨚魂汝當親問天尊指處皇后視之見一夜義面如葉籃眼如怪星指皇后而言前生之時我受隂注投你為母你身年幼全無惜護隨性作為因此不愼殺落我身今欲還報緣汝前世生居中國敬奉天地日月星辰勤侍翁婆孝順父母欽崇三寶至重善人塑像造經略無慳惜蓋殿修壇竭力施為憫憐困苦濟惠貧寒積此善功今生證為小國之后若非此福我即殺你料應多日皇后聞言心神懼怕戰戰兢兢拜跪道前我有先身曽作如是今日雖知悔之何及伏望天尊略示方便捨自巳之財盡為布施願求解釋天尊曰善哉善哉汝雖前生建大功德廣作福田即知不曾懴悔身中之𡨚結吾昔於正一天尊受三生解𡨚妙經汝當隨吾精心誦之𡨚業自消夫人禀天地而生搆隂陽而成三月之外始分男女可保而不可傷可養而不可害命與大人一體無異誤損有落便成𡨚債一日造𡨚三世報還豈不怖哉迷昧衆生倚恃年壯懷孕之時全無將護恣意而行登髙跳下負重急走或跨騎勞形或隂陽不慎或撞或隱或搦或按或撲或揉或服藥而損或針刺而傷或餐毒魚惡肉或喫硬物冷漿如斯等事妊孕多傷或是自作或教他殺害之因焉能盡說前生所作今身還報致使懷孕多病疼痛纒綿飲食减少行立艱難皮膚腫破腰似錐鑽巴明盻夜一日如年受此痛苦啀至月足臨産多般或連日不分或橫逆不順親姻恐懼眷屬憂惶當此之時𡨚家來害苦痛非常或母活子死或子活母死或子母俱亡皆為橫夭之魂若得託生依前再受若未託生纒害親姻若遇此經志心持念一切𡨚業盡總消除即說呪曰
